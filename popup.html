<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SuperCV Export</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 260px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif; background: #fff; color: #333; }
  .header { text-align: center; padding: 24px 20px 16px; }
  .header .logo { width: 40px; height: 40px; margin: 0 auto 10px; background: #dc2127; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; font-weight: 700; }
  .header h1 { font-size: 15px; font-weight: 600; color: #1a1a1a; }
  .header p { font-size: 11px; color: #999; margin-top: 2px; }
  .body { padding: 0 20px 20px; }
  .btn-export { width: 100%; padding: 12px 0; background: #dc2127; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; letter-spacing: .5px; transition: background .15s; }
  .btn-export:hover:not(:disabled) { background: #c01d22; }
  .btn-export:active:not(:disabled) { background: #b01a1f; }
  .btn-export:disabled { background: #e8e8e8; color: #bbb; cursor: not-allowed; }
  .hint { margin-top: 14px; font-size: 11px; color: #bbb; text-align: center; }
  .hint kbd { display: inline-block; padding: 1px 5px; border: 1px solid #e8e8e8; border-radius: 3px; background: #fafafa; font-family: inherit; font-size: 10px; color: #999; margin: 0 1px; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">CV</div>
  <h1>SuperCV Export</h1>
  <p>无水印矢量 PDF 导出</p>
</div>
<div class="body">
  <button class="btn-export" id="btnExport">无水印导出 PDF</button>
  <div class="hint">
    快捷键 <kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>P</kbd>
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
